<style>
  :root {
    --cream: #F4EEE3;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

  h1 {

  }

  .card {

    border: 1.5px solid var(--orange);

    padding: 1.4rem 1.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .card-tag {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--orange);
    text-transform: uppercase;
  }

  .card-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600;
    font-size: 1.5rem;
    line-height: 1.2;

  .card-desc {
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .card-link {
    margin-top: 0.6rem;
    display: flex;

    justify-content: center;
    min-height: 52px;
    padding: 0.85rem 1.25rem;
    border: 1.5px solid var(--orange);
    border-radius: 999px;
    color: var(--orange);
    background: transparent;
    font-size: 0.98rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    text-decoration: none;
    text-align: center;
    transition: background-color 0.18s ease, color 0.18s ease, transform 0.08s ease;
  }

  .card-link:hover { background: var(--orange); color: var(--cream); }
  .card-link:active { background: var(--orange-dark); border-color: var(--orange-dark); color: var(--cream); transform: scale(0.98); }
  .card-link:focus-visible { outline: 2px solid var(--orange); outline-offset: 3px; }

  .card.dashed {
    border-style: dashed;
    border-color: rgba(138, 129, 114, 0.45);
    align-items: center;
    justify-content: center;
    min-height: 88px;
    color: var(--muted);
    font-size: 0.92rem;
    text-align: center;
  }

  .back {
    margin-top: 2.25rem;
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.01em;
  }

  footer {
    margin-top: 3rem;
